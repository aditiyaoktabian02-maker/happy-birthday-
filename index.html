<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galaxy Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#000814;
color:white;
}

/* Background Galaxy */

.stars{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-3;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 4s infinite alternate;
}

@keyframes twinkle{

0%{
opacity:.2;
transform:scale(.5);
}

100%{
opacity:1;
transform:scale(1.8);
}

}

.nebula{

position:absolute;
width:700px;
height:700px;
border-radius:50%;
filter:blur(120px);

background:

radial-gradient(circle,
rgba(95,0,255,.45),
transparent 70%);

animation:moveNebula 20s linear infinite;

}

@keyframes moveNebula{

0%{
transform:translate(-200px,-150px);
}

50%{
transform:translate(150px,120px);
}

100%{
transform:translate(-200px,-150px);
}

}

/* Dynamic Island */

.island{

position:absolute;
top:30px;

left:50%;

transform:translateX(-50%);

width:280px;

height:52px;

background:rgba(20,20,20,.9);

border-radius:40px;

display:flex;

justify-content:center;

align-items:center;

backdrop-filter:blur(15px);

box-shadow:0 0 30px rgba(255,255,255,.08);

font-weight:600;

animation:island 3s infinite ease-in-out;

}

@keyframes island{

0%{
transform:translateX(-50%) scale(1);
}

50%{
transform:translateX(-50%) scale(1.04);
}

100%{
transform:translateX(-50%) scale(1);
}

}

/* Card */

.container{

text-align:center;

padding:40px;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

box-shadow:0 0 40px rgba(255,255,255,.08);

}

.container h1{

font-size:40px;

margin-bottom:15px;

}

.container p{

opacity:.8;

margin-bottom:30px;

}

.countdown{

display:flex;

gap:18px;

justify-content:center;

flex-wrap:wrap;

}

.box{

width:120px;

height:120px;

border-radius:25px;

background:rgba(255,255,255,.12);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

transition:.4s;

}

.box:hover{

transform:translateY(-10px);

background:rgba(255,255,255,.2);

}

.box h2{

font-size:42px;

}

.box span{

margin-top:8px;

font-size:14px;

letter-spacing:1px;

}

/* Glow */

.box h2{
color:#ffffff;
text-shadow:
0 0 10px #8ab4ff,
0 0 20px #8ab4ff,
0 0 40px #5f8cff;
}

#finish{

display:none;

font-size:38px;

font-weight:bold;

animation:zoom 1s infinite alternate;

}

@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.08);
}

}

canvas{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

z-index:999;

}

</style>

</head>

<body>

<div class="stars" id="stars">

<div class="nebula"></div>

</div>

<div class="island">
🚀 Menuju Hari Spesial
</div>

<div class="container">

<h1>Galaxy Countdown</h1>

<p>Hitung mundur menuju hari yang kamu tunggu.</p>

<div class="countdown">

<div class="box">
<h2 id="days">0</h2>
<span>Hari</span>
</div>

<div class="box">
<h2 id="hours">0</h2>
<span>Jam</span>
</div>

<div class="box">
<h2 id="minutes">0</h2>
<span>Menit</span>
</div>

<div class="box">
<h2 id="seconds">0</h2>
<span>Detik</span>
</div>

</div>

<h1 id="finish">
🎉 Selamat! Hari yang ditunggu telah tiba! ❤️
</h1>

</div>

<audio id="music" autoplay loop>
<source src="Shape Of My Heart - Backstreet Boys #songlyrics #audio #🥀 #fyp mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<script>

// lanjut di Part 3

// ===============================
// TANGGAL COUNTDOWN
// ===============================

// Ganti sesuai tanggal yang kamu inginkan
const target = new Date("July 23, 2026 19:53:00").getTime();

const days = document.getElementById("days");
const hours = document.getElementById("hours");
const minutes = document.getElementById("minutes");
const seconds = document.getElementById("seconds");

const finish = document.getElementById("finish");

const timer = setInterval(() => {

const now = new Date().getTime();

const distance = target - now;

if(distance <= 0){

clearInterval(timer);

document.querySelector(".countdown").style.display="none";

finish.style.display="block";

startConfetti();

return;

}

days.innerHTML=Math.floor(distance/(1000*60*60*24));

hours.innerHTML=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

minutes.innerHTML=Math.floor((distance%(1000*60*60))/(1000*60));

seconds.innerHTML=Math.floor((distance%(1000*60))/1000);

},1000);

// ===============================
// MEMBUAT BINTANG
// ===============================

const stars=document.getElementById("stars");

for(let i=0;i<250;i++){

const star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

star.style.animationDuration=(2+Math.random()*5)+"s";

star.style.opacity=Math.random();

stars.appendChild(star);

}

// ===============================
// CONFETTI
// ===============================

const canvas=document.getElementById("confetti");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let confetti=[];

function startConfetti(){

for(let i=0;i<300;i++){

confetti.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height-canvas.height,

r:4+Math.random()*6,

d:Math.random()*300,

vx:-2+Math.random()*4,

vy:2+Math.random()*4,

});

}

animateConfetti();

}

function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(c=>{

ctx.beginPath();

ctx.arc(c.x,c.y,c.r,0,Math.PI*2);

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;

ctx.fill();

c.y+=c.vy;

c.x+=c.vx;

if(c.y>canvas.height){

c.y=-20;

}

});

requestAnimationFrame(animateConfetti);

}

window.onresize=()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}  

// ===============================
// MUSIK OTOMATIS
// ===============================

const music = document.getElementById("music");

document.addEventListener("click",()=>{

music.play();

},{once:true});


// ===============================
// DYNAMIC ISLAND TEXT ANIMATION
// ===============================

const island = document.querySelector(".island");

const texts=[
"🚀 Menuju Hari Spesial",
"✨ Galaxy Countdown",
"🌌 Exploring The Universe",
"💫 Jangan Lupa Bahagia"
];

let index=0;

setInterval(()=>{

index++;

if(index>=texts.length){
index=0;
}

island.innerHTML=texts[index];

},3000);


// ===============================
// SHOOTING STAR
// ===============================

function shootingStar(){

const star=document.createElement("div");

star.style.position="fixed";

star.style.width="120px";

star.style.height="2px";

star.style.background=
"linear-gradient(90deg,white,transparent)";

star.style.top=
Math.random()*50+"%";

star.style.left=
Math.random()*100+"%";

star.style.transform=
"rotate(-35deg)";

star.style.zIndex="0";

star.style.animation=
"shoot 1.5s linear";

document.body.appendChild(star);


setTimeout(()=>{

star.remove();

},1500);

}


setInterval(shootingStar,2500);


// ===============================
// TAMBAHAN ANIMASI SHOOT
// ===============================

const style=document.createElement("style");

style.innerHTML=`

@keyframes shoot{

0%{

transform:
translate(0,0)
rotate(-35deg);

opacity:1;

}

100%{

transform:
translate(-500px,500px)
rotate(-35deg);

opacity:0;

}

}

`;

document.head.appendChild(style);


// ===============================
// AUTO PLAY SAAT BROWSER IZIN
// ===============================

window.addEventListener("load",()=>{

music.volume=0.5;

music.play().catch(()=>{

console.log("Klik layar untuk mulai musik");

});

});


</script>

</body>

</html>
